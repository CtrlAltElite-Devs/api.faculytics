services:
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory-policy noeviction
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  mock-worker:
    build:
      context: ./mock-worker
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      MOCK_WORKER_DELAY_MS: 2000
      PORT: 3001
