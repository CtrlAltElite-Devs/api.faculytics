events {
    worker_connections 1024;
}

http {
    # Shared settings
    client_max_body_size 10m;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Proxy timeouts
    proxy_connect_timeout 60s;
    proxy_read_timeout 120s;
    proxy_send_timeout 60s;

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name api.faculytics.ctr3.org staging.api.faculytics.ctr3.org;
        return 301 https://$host$request_uri;
    }

    # Production API
    server {
        listen 443 ssl;
        server_name api.faculytics.ctr3.org;

        ssl_certificate /etc/letsencrypt/live/api.faculytics.ctr3.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.faculytics.ctr3.org/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://api-production:5200;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # Staging API
    server {
        listen 443 ssl;
        server_name staging.api.faculytics.ctr3.org;

        ssl_certificate /etc/letsencrypt/live/api.faculytics.ctr3.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.faculytics.ctr3.org/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://api-staging:5201;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
